<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historia IG — Caja Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #F4DDD7;
    --surface: #FBEAE4;
    --cream:   #FAF1E8;
    --card:    #FFFFFF;
    --ink:     #3B2521;
    --muted:   #9C7A6F;
    --accent:  #A04A36;
    --rule:    #E5C9C0;
    --gold:    #C9985E;
  }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
  }

  .story {
    width: 1080px;
    height: 1920px;
    position: relative;
    background:
      radial-gradient(ellipse at top left, rgba(201,152,94,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(160,74,54,0.12) 0%, transparent 50%),
      var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Decorative shapes */
  .deco-circle-1 {
    position: absolute;
    top: -180px; right: -180px;
    width: 560px; height: 560px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(160,74,54,0.10) 0%, transparent 70%);
  }
  .deco-circle-2 {
    position: absolute;
    bottom: 200px; left: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,152,94,0.12) 0%, transparent 70%);
  }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: 80px 80px 0;
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .avatar {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    overflow: hidden;
    background: var(--surface);
    flex-shrink: 0;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .handle {
    display: flex; flex-direction: column;
  }
  .handle-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.5px;
  }
  .handle-sub {
    font-size: 26px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 2px;
  }
  .category-badge {
    margin-left: auto;
    background: var(--accent);
    border-radius: 60px;
    padding: 14px 34px;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }

  /* Pick label */
  .pick-label {
    position: relative;
    z-index: 10;
    margin-top: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 38px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .pick-line {
    width: 80px; height: 1.5px;
    background: var(--rule);
  }

  /* Product image */
  .product-img-wrap {
    position: relative;
    z-index: 10;
    margin-top: 44px;
    width: 800px;
    height: 800px;
    border-radius: 40px;
    overflow: hidden;
    background: var(--card);
    box-shadow:
      0 8px 24px rgba(59,37,33,0.08),
      0 40px 100px rgba(59,37,33,0.14);
  }
  .product-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 24px;
  }
  .img-badge {
    position: absolute;
    top: 32px; left: 32px;
    background: var(--accent);
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    padding: 12px 26px;
    border-radius: 40px;
  }

  /* Info card */
  .info-card {
    position: relative;
    z-index: 10;
    margin-top: 56px;
    width: 920px;
    background: var(--cream);
    border: 1.5px solid var(--rule);
    border-radius: 36px;
    padding: 52px 60px;
  }

  .product-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 50px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 36px;
  }

  .price-row {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 28px 36px;
    background: var(--accent);
    border-radius: 24px;
    margin-bottom: 28px;
  }
  .price-label {
    font-size: 28px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .price-value {
    font-size: 64px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
    line-height: 1;
    margin-left: auto;
  }

  .shipping-row {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 24px 36px;
    background: var(--surface);
    border: 1.5px solid var(--rule);
    border-radius: 24px;
  }
  .shipping-icon { font-size: 36px; }
  .shipping-text {
    font-size: 28px;
    font-weight: 500;
    color: var(--muted);
    line-height: 1.4;
  }
  .shipping-cost {
    color: var(--ink);
    font-weight: 700;
  }

  /* CTA */
  .cta-wrap {
    position: relative;
    z-index: 10;
    margin-top: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 920px;
  }
  .cta-btn {
    width: 100%;
    background: var(--ink);
    border-radius: 32px;
    padding: 44px 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cta-left { display: flex; flex-direction: column; }
  .cta-action {
    font-size: 38px;
    font-weight: 700;
    color: #fff;
  }
  .cta-link {
    font-size: 28px;
    font-weight: 500;
    color: var(--gold);
    margin-top: 6px;
  }
  .cta-arrow {
    font-size: 52px;
    color: var(--gold);
  }
  .swipe-hint {
    font-size: 28px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* Footer */
  .footer {
    position: relative;
    z-index: 10;
    margin-top: auto;
    padding-bottom: 64px;
    font-size: 24px;
    font-weight: 500;
    color: var(--muted);
    opacity: 0.6;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="story">
  <div class="deco-circle-1"></div>
  <div class="deco-circle-2"></div>

  <!-- Header -->
  <div class="header">
    <div class="avatar">
      <img src="../bibirecomiendaimage.jpg" alt="Bibi" onerror="this.style.display='none'">
    </div>
    <div class="handle">
      <span class="handle-name">Bibi Recomienda</span>
      <span class="handle-sub">@bibi.recomienda</span>
    </div>
    <div class="category-badge">🐱 Mascotas</div>
  </div>

  <!-- Pick label -->
  <div class="pick-label">
    <div class="pick-line"></div>
    Pick del día
    <div class="pick-line"></div>
  </div>

  <!-- Product image -->
  <div class="product-img-wrap">
    <img src="https://m.media-amazon.com/images/I/616zZxB0g1L._AC_SL1500_.jpg" alt="Caja arena autolimpiante">
    <div class="img-badge">⭐ 4.1 · 1K+ opiniones</div>
  </div>

  <!-- Info card -->
  <div class="info-card">
    <div class="product-title">
      Caja de arena autolimpiante<br>para gatos 🐾
    </div>
    <div class="price-row">
      <span class="price-label">Precio</span>
      <span class="price-value">COP $465.165</span>
    </div>
    <div class="shipping-row">
      <span class="shipping-icon">✈️</span>
      <span class="shipping-text">
        Envío internacional a Colombia:<br>
        <span class="shipping-cost">+ COP $301.004 adicionales</span>
      </span>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <div class="cta-btn">
      <div class="cta-left">
        <span class="cta-action">Ver en Amazon</span>
        <span class="cta-link">amzn.to/4nOg87a</span>
      </div>
      <span class="cta-arrow">→</span>
    </div>
    <div class="swipe-hint">↑ Desliza para ir al producto</div>
  </div>

  <div class="footer">bibirecomienda.github.io</div>
</div>
</body>
</html>
